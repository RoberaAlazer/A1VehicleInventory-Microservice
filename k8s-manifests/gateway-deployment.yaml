apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert --out k8s-manifests
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: gateway
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: gateway
  template:
    metadata:
      annotations:
        kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert --out k8s-manifests
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: gateway
    spec:
      containers:
        - env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ApiGateway__ApiKey
              value: my-secret-key-12345
          image: a1vehicleinventory-microservice-main-gateway
          imagePullPolicy: IfNotPresent
          name: carrental-gateway
          ports:
            - containerPort: 8080
              protocol: TCP
      restartPolicy: Always